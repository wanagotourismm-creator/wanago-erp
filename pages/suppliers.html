<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Suppliers & Hotels — Wanago ERP</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    /* ── stats ── */
    .sup-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px 24px 0}
    .sup-stat{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #e8ecf0;display:flex;align-items:center;gap:12px}
    .sup-stat-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .sup-stat-num{font-size:22px;font-weight:700;line-height:1}
    .sup-stat-label{font-size:11.5px;color:#64748b;margin-top:2px}
    @media(max-width:900px){.sup-stats{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:600px){.sup-stats{grid-template-columns:1fr 1fr}}

    /* ── toolbar ── */
    .sup-toolbar{display:flex;align-items:center;gap:10px;padding:14px 24px 0;flex-wrap:wrap}
    .sup-tabs{display:flex;gap:6px;background:#f1f5f9;border-radius:10px;padding:4px;flex-shrink:0}
    .sup-tab{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .15s}
    .sup-tab.active{background:#fff;color:#1e293b;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .sup-search{border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;font-family:inherit;min-width:200px;flex:1}
    .sup-search:focus{border-color:#6366f1}
    .sup-filter{border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;font-family:inherit;background:#fff;cursor:pointer}
    .sup-filter:focus{border-color:#6366f1}

    /* ── supplier grid ── */
    .sup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:14px 24px 24px}
    .sup-card{background:#fff;border-radius:12px;border:1px solid #e8ecf0;padding:16px;cursor:pointer;transition:all .15s;position:relative}
    .sup-card:hover{border-color:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,.1)}
    .sup-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
    .sup-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .sup-name{font-size:14px;font-weight:700;color:#1e293b}
    .sup-type-chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600;margin-top:3px}
    .sup-card-detail{font-size:12px;color:#64748b;display:flex;align-items:center;gap:5px;margin-bottom:4px}
    .sup-rating{display:flex;gap:2px;margin-top:6px}
    .sup-star{font-size:13px}
    .sup-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9}

    /* ── empty ── */
    .sup-empty{text-align:center;padding:60px 24px;color:#94a3b8;font-size:13px;grid-column:1/-1}

    /* ── allocation table ── */
    .alloc-card{background:#fff;border-radius:14px;border:1px solid #e8ecf0;margin:14px 24px 24px;overflow:hidden}
    .alloc-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f1f5f9}
    .alloc-card-title{font-size:14px;font-weight:600;color:#1e293b}
    .alloc-table{width:100%;border-collapse:collapse}
    .alloc-table th{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;background:#fafafa;border-bottom:1px solid #f1f5f9}
    .alloc-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle}
    .alloc-table tr:last-child td{border-bottom:none}
    .alloc-table tr:hover td{background:#fafafe}
    .alloc-empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px}

    /* ── chips ── */
    .chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
    .chip-green{background:#dcfce7;color:#166534}
    .chip-blue{background:#dbeafe;color:#1e40af}
    .chip-amber{background:#fef9c3;color:#854d0e}
    .chip-purple{background:#ede9fe;color:#5b21b6}
    .chip-red{background:#fee2e2;color:#991b1b}
    .chip-gray{background:#f1f5f9;color:#475569}
    .chip-teal{background:#ccfbf1;color:#0f766e}
    .chip-pink{background:#fce7f3;color:#9d174d}
    .chip-orange{background:#ffedd5;color:#c2410c}

    /* ── buttons ── */
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
    .btn-outline{background:#fff;color:#475569;border:1.5px solid #e2e8f0}.btn-outline:hover{border-color:#6366f1;color:#6366f1}
    .btn-sm{padding:5px 12px;font-size:12px}
    .btn-danger-sm{background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer}

    /* ── modals ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:16px;width:min(560px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-box-lg{width:min(640px,95vw)}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #f1f5f9}
    .modal-hdr h3{font-size:16px;font-weight:700;color:#1e293b;margin:0}
    .modal-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer}
    .modal-body{padding:20px 22px}
    .modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end}

    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .form-label{font-size:12px;font-weight:600;color:#475569}
    .form-input,.form-select,.form-textarea{border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;background:#fff;transition:border .15s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#6366f1}
    .form-textarea{resize:vertical;min-height:70px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

    /* ── stars input ── */
    .stars-input{display:flex;gap:4px}
    .stars-input span{font-size:22px;cursor:pointer;transition:transform .1s}
    .stars-input span:hover{transform:scale(1.2)}
  </style>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo"><span style="color:#c9a84c">wana</span>go</div>
  <div class="loader-spinner"></div>
</div>

<div class="app">
  <aside id="sidebar" class="sidebar"></aside>

  <div id="main" style="overflow-y:auto">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title">Suppliers & Hotels</div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openSupplierModal(null)">+ Add Supplier</button>
        <div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div>
    </div>

    <!-- Stats -->
    <div class="sup-stats" id="sup-stats">
      <div class="sup-stat" style="background:#f0fdf4"><div class="sup-stat-icon" style="background:#dcfce7">🏨</div><div><div class="sup-stat-num" id="stat-hotels">—</div><div class="sup-stat-label">Hotels</div></div></div>
      <div class="sup-stat" style="background:#f8fafc"><div class="sup-stat-icon" style="background:#dbeafe">🚗</div><div><div class="sup-stat-num" id="stat-transport">—</div><div class="sup-stat-label">Transport</div></div></div>
      <div class="sup-stat" style="background:#fefce8"><div class="sup-stat-icon" style="background:#fef9c3">🎯</div><div><div class="sup-stat-num" id="stat-activity">—</div><div class="sup-stat-label">Activities</div></div></div>
      <div class="sup-stat" style="background:#f5f3ff"><div class="sup-stat-icon" style="background:#ede9fe">📦</div><div><div class="sup-stat-num" id="stat-other">—</div><div class="sup-stat-label">Other</div></div></div>
      <div class="sup-stat" style="background:#fff7ed"><div class="sup-stat-icon" style="background:#ffedd5">🔗</div><div><div class="sup-stat-num" id="stat-allocations">—</div><div class="sup-stat-label">Allocations</div></div></div>
    </div>

    <!-- Toolbar -->
    <div class="sup-toolbar">
      <div class="sup-tabs">
        <button class="sup-tab active" id="tab-directory"   onclick="setSupTab('directory')">Directory</button>
        <button class="sup-tab"        id="tab-allocations" onclick="setSupTab('allocations')">Booking Allocations</button>
      </div>
      <input class="sup-search" id="sup-search" type="search" placeholder="Search by name, city, type…" oninput="renderSupTab()"/>
      <select class="sup-filter" id="sup-type-filter" onchange="renderSupTab()">
        <option value="">All Types</option>
        <option value="hotel">Hotel</option>
        <option value="transport">Transport</option>
        <option value="activity">Activity</option>
        <option value="restaurant">Restaurant</option>
        <option value="airline">Airline</option>
        <option value="cruise">Cruise</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Content -->
    <div id="sup-content"></div>

  </div>
</div>

<!-- ── Add / Edit Supplier Modal ── -->
<div class="modal-overlay" id="modal-supplier">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="supplier-modal-title">Add Supplier</h3>
      <button class="modal-close" onclick="closeSupplierModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sup-edit-id"/>
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Supplier / Company Name *</label>
          <input class="form-input" id="sup-name" placeholder="e.g. The Leela Palace"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type *</label>
          <select class="form-select" id="sup-type">
            <option value="hotel">🏨 Hotel</option>
            <option value="transport">🚗 Transport</option>
            <option value="activity">🎯 Activity / Tour</option>
            <option value="restaurant">🍽️ Restaurant</option>
            <option value="airline">✈️ Airline</option>
            <option value="cruise">🚢 Cruise</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">City / Location</label>
          <input class="form-input" id="sup-city" placeholder="e.g. Dubai"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input class="form-input" id="sup-contact" placeholder="e.g. Arun Sharma"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="sup-phone" placeholder="+91 98765 43210" type="tel"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="sup-email" placeholder="reservations@hotel.com" type="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Website</label>
          <input class="form-input" id="sup-website" placeholder="www.hotel.com"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contract / Base Rate</label>
          <input class="form-input" id="sup-rate" placeholder="e.g. ₹3500/night B&B"/>
        </div>
        <div class="form-group">
          <label class="form-label">GST / PAN Number</label>
          <input class="form-input" id="sup-gst" placeholder="e.g. 29AABCU9603R1ZM"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input class="form-input" id="sup-address" placeholder="Full address"/>
      </div>
      <div class="form-group">
        <label class="form-label">Rating</label>
        <div class="stars-input" id="sup-stars-input" onclick="setSupplierRating(event)">
          <span data-val="1">⭐</span><span data-val="2">⭐</span><span data-val="3">⭐</span><span data-val="4">⭐</span><span data-val="5">⭐</span>
        </div>
        <input type="hidden" id="sup-rating" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="sup-notes" placeholder="Contract terms, special conditions, blackout dates…"></textarea>
      </div>
      <div id="sup-modal-error" style="color:#ef4444;font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeSupplierModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSupplier()">Save Supplier</button>
    </div>
  </div>
</div>

<!-- ── Allocate Supplier to Booking Modal ── -->
<div class="modal-overlay" id="modal-allocate">
  <div class="modal-box modal-box-lg">
    <div class="modal-hdr">
      <h3 id="alloc-modal-title">Allocate Supplier</h3>
      <button class="modal-close" onclick="closeAllocateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Booking *</label>
        <select class="form-select" id="alloc-booking" onchange="onAllocBookingChange()">
          <option value="">— Select booking —</option>
        </select>
      </div>
      <div id="alloc-booking-preview" style="display:none;background:#f8fafc;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px">
        <span id="abp-text"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Supplier *</label>
          <select class="form-select" id="alloc-supplier" onchange="onAllocSupplierChange()">
            <option value="">— Select supplier —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Service Type</label>
          <select class="form-select" id="alloc-service-type">
            <option value="accommodation">🏨 Accommodation</option>
            <option value="transport">🚗 Transport / Transfer</option>
            <option value="activity">🎯 Activity / Tour</option>
            <option value="meal">🍽️ Meals</option>
            <option value="guide">🗺️ Guide</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="hotel-fields">
        <div class="form-group">
          <label class="form-label">Check-in Date</label>
          <input class="form-input" type="date" id="alloc-checkin"/>
        </div>
        <div class="form-group">
          <label class="form-label">Check-out Date</label>
          <input class="form-input" type="date" id="alloc-checkout"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Room / Vehicle / Description</label>
          <input class="form-input" id="alloc-room" placeholder="e.g. Deluxe Twin, 2 rooms / Toyota Innova"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmation / Voucher No.</label>
          <input class="form-input" id="alloc-conf" placeholder="e.g. HTL-20241201-001"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Confirmed Rate (₹)</label>
          <input class="form-input" type="number" id="alloc-rate" placeholder="0" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">PAX / Units</label>
          <input class="form-input" type="number" id="alloc-pax" placeholder="1" min="1" value="1"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="alloc-notes" placeholder="Any special requests, room preferences, meal plans…" rows="2"></textarea>
      </div>
      <div id="alloc-error" style="color:#ef4444;font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAllocateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAllocation()">Save Allocation</button>
    </div>
  </div>
</div>

<!-- ── View Supplier Detail Modal ── -->
<div class="modal-overlay" id="modal-sup-detail">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="sup-detail-title">Supplier Details</h3>
      <button class="modal-close" onclick="closeSupDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="sup-detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="sup-detail-edit-btn">Edit Supplier</button>
      <button class="btn btn-primary" onclick="openAllocateModal(null)">+ Allocate to Booking</button>
    </div>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/suppliers.js"></script>
</body>
</html>

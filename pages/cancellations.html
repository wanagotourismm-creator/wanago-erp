<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cancellations & Rescheduling — Wanago ERP</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    /* ── stats ── */
    .cn-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px 24px 0}
    .cn-stat{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e8ecf0;display:flex;align-items:center;gap:14px}
    .cn-stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .cn-stat-num{font-size:24px;font-weight:700;line-height:1}
    .cn-stat-label{font-size:12px;color:#64748b;margin-top:3px}
    .cn-stat.red   .cn-stat-icon{background:#fee2e2}
    .cn-stat.amber .cn-stat-icon{background:#fef9c3}
    .cn-stat.green .cn-stat-icon{background:#dcfce7}
    .cn-stat.blue  .cn-stat-icon{background:#dbeafe}
    @media(max-width:768px){.cn-stats{grid-template-columns:1fr 1fr}}

    /* ── toolbar ── */
    .cn-toolbar{display:flex;align-items:center;gap:10px;padding:14px 24px 0;flex-wrap:wrap}
    .cn-tabs{display:flex;gap:6px;background:#f1f5f9;border-radius:10px;padding:4px;flex-shrink:0}
    .cn-tab{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .15s}
    .cn-tab.active{background:#fff;color:#1e293b;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .cn-search{border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;font-family:inherit;min-width:200px;flex:1}
    .cn-search:focus{border-color:#6366f1}

    /* ── table card ── */
    .cn-card{background:#fff;border-radius:14px;border:1px solid #e8ecf0;margin:14px 24px 24px;overflow:hidden}
    .cn-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f1f5f9}
    .cn-card-title{font-size:14px;font-weight:600;color:#1e293b}
    .cn-table{width:100%;border-collapse:collapse}
    .cn-table th{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;background:#fafafa;border-bottom:1px solid #f1f5f9}
    .cn-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle}
    .cn-table tr:last-child td{border-bottom:none}
    .cn-table tr:hover td{background:#fafafe}
    .cn-empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px}

    /* ── chips ── */
    .chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
    .chip-red{background:#fee2e2;color:#991b1b}
    .chip-amber{background:#fef9c3;color:#854d0e}
    .chip-green{background:#dcfce7;color:#166534}
    .chip-blue{background:#dbeafe;color:#1e40af}
    .chip-gray{background:#f1f5f9;color:#475569}
    .chip-purple{background:#ede9fe;color:#5b21b6}

    /* ── action buttons ── */
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
    .btn-red{background:#ef4444;color:#fff}.btn-red:hover{background:#dc2626}
    .btn-outline{background:#fff;color:#475569;border:1.5px solid #e2e8f0}.btn-outline:hover{border-color:#6366f1;color:#6366f1}
    .btn-sm{padding:5px 12px;font-size:12px}
    .btn-amber{background:#f59e0b;color:#fff}.btn-amber:hover{background:#d97706}

    /* ── modals ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:16px;width:min(520px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #f1f5f9}
    .modal-hdr h3{font-size:16px;font-weight:700;color:#1e293b;margin:0}
    .modal-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer}
    .modal-body{padding:20px 22px}
    .modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end}
    .booking-info-box{background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:16px}
    .booking-info-box .b-id{font-size:11px;font-weight:700;color:#6366f1}
    .booking-info-box .b-name{font-size:14px;font-weight:600;color:#1e293b;margin-top:2px}
    .booking-info-box .b-sub{font-size:12px;color:#64748b;margin-top:2px}

    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .form-label{font-size:12px;font-weight:600;color:#475569}
    .form-input,.form-select,.form-textarea{border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;background:#fff;transition:border .15s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#6366f1}
    .form-textarea{resize:vertical;min-height:70px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* ── reschedule history ── */
    .reschedule-entry{background:#f8fafc;border:1px solid #e8ecf0;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12.5px}
    .reschedule-arrow{color:#6366f1;font-weight:700}

    /* ── refund status colors ── */
    .refund-none{color:#94a3b8}
    .refund-pending{color:#f59e0b;font-weight:600}
    .refund-partial{color:#6366f1;font-weight:600}
    .refund-full{color:#22c55e;font-weight:600}
  </style>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo"><span style="color:#c9a84c">wana</span>go</div>
  <div class="loader-spinner"></div>
</div>

<div class="app">
  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content" style="overflow-y:auto">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" onclick="toggleSidebar()">&#9776;</button>
        <span class="topbar-title">Cancellations & Rescheduling</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-red btn-sm" onclick="openCancelModal(null)">+ Cancel Booking</button>
        <button class="btn btn-amber btn-sm" style="margin-left:6px" onclick="openRescheduleModal(null)">↺ Reschedule</button>
        <span class="topbar-user" id="topbar-user" style="margin-left:10px"></span>
        <button class="btn-icon" onclick="handleLogout()" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="cn-stats" id="cn-stats">
      <div class="cn-stat red">  <div class="cn-stat-icon">❌</div><div><div class="cn-stat-num" id="stat-cancelled">—</div><div class="cn-stat-label">Total Cancelled</div></div></div>
      <div class="cn-stat amber"><div class="cn-stat-icon">⏳</div><div><div class="cn-stat-num" id="stat-refund-pending">—</div><div class="cn-stat-label">Refund Pending</div></div></div>
      <div class="cn-stat green"><div class="cn-stat-icon">✅</div><div><div class="cn-stat-num" id="stat-refunded">—</div><div class="cn-stat-label">Refunded</div></div></div>
      <div class="cn-stat blue"> <div class="cn-stat-icon">🔄</div><div><div class="cn-stat-num" id="stat-rescheduled">—</div><div class="cn-stat-label">Rescheduled</div></div></div>
    </div>

    <!-- Toolbar -->
    <div class="cn-toolbar">
      <div class="cn-tabs">
        <button class="cn-tab active" id="tab-cancellations" onclick="setCnTab('cancellations')">Cancellations</button>
        <button class="cn-tab"        id="tab-reschedules"   onclick="setCnTab('reschedules')">Reschedules</button>
        <button class="cn-tab"        id="tab-refunds"       onclick="setCnTab('refunds')">Refund Tracker</button>
      </div>
      <input class="cn-search" id="cn-search" type="search" placeholder="Search customer, booking ID…" oninput="renderCnTab()"/>
    </div>

    <!-- Table Card -->
    <div class="cn-card">
      <div class="cn-card-hdr">
        <span class="cn-card-title" id="cn-tab-title">Cancelled Bookings</span>
        <span id="cn-row-count" style="font-size:12px;color:#94a3b8"></span>
      </div>
      <div style="overflow-x:auto">
        <div id="cn-table-wrap"></div>
      </div>
    </div>

  </main>
</div>

<!-- ── Cancel Booking Modal ── -->
<div class="modal-overlay" id="modal-cancel">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3>Cancel Booking</h3>
      <button class="modal-close" onclick="closeCancelModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Select Booking *</label>
        <select class="form-select" id="cancel-booking-select" onchange="onCancelBookingChange()">
          <option value="">— Choose a booking —</option>
        </select>
      </div>
      <div id="cancel-booking-preview" style="display:none" class="booking-info-box">
        <div class="b-id" id="cbp-id"></div>
        <div class="b-name" id="cbp-name"></div>
        <div class="b-sub" id="cbp-sub"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cancellation Date *</label>
          <input class="form-input" type="date" id="cancel-date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Cancelled By</label>
          <input class="form-input" id="cancel-by" placeholder="e.g. Customer / Office"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Reason *</label>
        <select class="form-select" id="cancel-reason-select" onchange="onCancelReasonChange()">
          <option value="">— Select reason —</option>
          <option value="Customer Request">Customer Request</option>
          <option value="Visa Rejection">Visa Rejection</option>
          <option value="Flight Cancelled">Flight Cancelled</option>
          <option value="Medical Emergency">Medical Emergency</option>
          <option value="Natural Disaster / Force Majeure">Natural Disaster / Force Majeure</option>
          <option value="Non-payment">Non-payment</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group" id="cancel-reason-other-wrap" style="display:none">
        <label class="form-label">Specify Reason</label>
        <input class="form-input" id="cancel-reason-other" placeholder="Enter reason…"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Refund Status</label>
          <select class="form-select" id="cancel-refund-status">
            <option value="none">No Refund</option>
            <option value="pending">Refund Pending</option>
            <option value="partial">Partial Refund</option>
            <option value="full">Full Refund</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Refund Amount (₹)</label>
          <input class="form-input" type="number" id="cancel-refund-amount" placeholder="0" min="0"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="cancel-notes" placeholder="Any additional notes about this cancellation…"></textarea>
      </div>
      <div id="cancel-error" style="color:#ef4444;font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCancelModal()">Cancel</button>
      <button class="btn btn-red" onclick="saveCancellation()">Confirm Cancellation</button>
    </div>
  </div>
</div>

<!-- ── Reschedule Modal ── -->
<div class="modal-overlay" id="modal-reschedule">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3>Reschedule Booking</h3>
      <button class="modal-close" onclick="closeRescheduleModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Select Booking *</label>
        <select class="form-select" id="reschedule-booking-select" onchange="onRescheduleBookingChange()">
          <option value="">— Choose a booking —</option>
        </select>
      </div>
      <div id="reschedule-booking-preview" style="display:none" class="booking-info-box">
        <div class="b-id" id="rbp-id"></div>
        <div class="b-name" id="rbp-name"></div>
        <div class="b-sub" id="rbp-sub"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">New Departure Date *</label>
          <input class="form-input" type="date" id="reschedule-new-date"/>
        </div>
        <div class="form-group">
          <label class="form-label">New Package (optional)</label>
          <input class="form-input" id="reschedule-new-pkg" placeholder="Leave blank to keep current"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Rescheduled By</label>
          <input class="form-input" id="reschedule-by" placeholder="e.g. Customer / Office"/>
        </div>
        <div class="form-group">
          <label class="form-label">Reschedule Date</label>
          <input class="form-input" type="date" id="reschedule-on-date"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Reason</label>
        <input class="form-input" id="reschedule-reason" placeholder="e.g. Customer request, flight change…"/>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="reschedule-notes" placeholder="Any additional notes…"></textarea>
      </div>
      <div id="reschedule-error" style="color:#ef4444;font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRescheduleModal()">Cancel</button>
      <button class="btn btn-amber" onclick="saveReschedule()">Confirm Reschedule</button>
    </div>
  </div>
</div>

<!-- ── Refund Update Modal ── -->
<div class="modal-overlay" id="modal-refund">
  <div class="modal-box" style="width:min(440px,95vw)">
    <div class="modal-hdr">
      <h3>Update Refund</h3>
      <button class="modal-close" onclick="closeRefundModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="booking-info-box">
        <div class="b-id" id="rfp-id"></div>
        <div class="b-name" id="rfp-name"></div>
        <div class="b-sub" id="rfp-sub"></div>
      </div>
      <input type="hidden" id="refund-booking-id"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Refund Status</label>
          <select class="form-select" id="refund-status">
            <option value="none">No Refund</option>
            <option value="pending">Refund Pending</option>
            <option value="partial">Partial Refund</option>
            <option value="full">Full Refund</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount Refunded (₹)</label>
          <input class="form-input" type="number" id="refund-amount" min="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Refund Date</label>
          <input class="form-input" type="date" id="refund-date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Mode</label>
          <select class="form-select" id="refund-mode">
            <option value="">—</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="UPI">UPI</option>
            <option value="Cash">Cash</option>
            <option value="Cheque">Cheque</option>
            <option value="Credit Note">Credit Note</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="refund-notes" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRefundModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRefundUpdate()">Update Refund</button>
    </div>
  </div>
</div>

<!-- ── Reschedule History Modal ── -->
<div class="modal-overlay" id="modal-history">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="history-title">Reschedule History</h3>
      <button class="modal-close" onclick="closeHistoryModal()">✕</button>
    </div>
    <div class="modal-body" id="history-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeHistoryModal()">Close</button>
    </div>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/cancellations.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Team Chat — Wanago ERP</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <link rel="stylesheet" href="../styles/design-system.css"/>
  <style>
    /* ── layout: full-height two-panel ── */
    .chat-wrap{display:flex;height:calc(100vh - 56px);overflow:hidden}

    /* ── channels sidebar ── */
    .chat-sidebar{width:270px;min-width:240px;flex-shrink:0;border-right:1px solid #e8ecf0;display:flex;flex-direction:column;background:#fafbfc}
    .chat-sidebar-hdr{padding:14px 16px;border-bottom:1px solid #e8ecf0;display:flex;align-items:center;justify-content:space-between}
    .chat-sidebar-title{font-size:13px;font-weight:700;color:#1e293b}
    .chat-sidebar-search{padding:8px 12px;border-bottom:1px solid #f1f5f9}
    .chat-channel-search{width:100%;border:1.5px solid #e2e8f0;border-radius:7px;padding:6px 10px;font-size:12.5px;outline:none;font-family:inherit;box-sizing:border-box;background:#fff}
    .chat-channel-search:focus{border-color:#6366f1}
    .chat-channels{flex:1;overflow-y:auto}
    .channel-section-label{padding:10px 14px 4px;font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px}
    .channel-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-radius:0;transition:background .1s;position:relative}
    .channel-item:hover{background:#f0f4ff}
    .channel-item.active{background:#eef2ff;border-right:3px solid #6366f1}
    .channel-item:not(.active){border-right:3px solid transparent}
    .channel-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .channel-name{font-size:13px;font-weight:500;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .channel-item.active .channel-name{font-weight:700;color:#1e293b}
    .channel-badge{background:#6366f1;color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:1px 6px;min-width:18px;text-align:center;flex-shrink:0}
    .channel-preview{font-size:11px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}

    /* ── new channel quick-add ── */
    .chat-add-thread{padding:10px 12px;border-top:1px solid #f1f5f9}
    .chat-add-select{width:100%;border:1.5px solid #e2e8f0;border-radius:7px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;background:#fff;cursor:pointer}
    .chat-add-select:focus{border-color:#6366f1}

    /* ── main chat area ── */
    .chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff}
    .chat-main-hdr{padding:12px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .chat-main-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .chat-main-title{font-size:15px;font-weight:700;color:#1e293b}
    .chat-main-sub{font-size:12px;color:#94a3b8;margin-top:1px}
    .chat-main-actions{margin-left:auto;display:flex;gap:6px}

    /* ── messages ── */
    .chat-messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
    .chat-date-divider{text-align:center;margin:8px 0}
    .chat-date-divider span{font-size:11px;color:#94a3b8;background:#f8fafc;border:1px solid #e8ecf0;border-radius:99px;padding:3px 12px}
    .msg-row{display:flex;align-items:flex-end;gap:9px}
    .msg-row.mine{flex-direction:row-reverse}
    .msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-bottom:2px}
    .msg-bubble{max-width:65%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;word-break:break-word;position:relative}
    .msg-row:not(.mine) .msg-bubble{background:#f1f5f9;color:#1e293b;border-bottom-left-radius:4px}
    .msg-row.mine .msg-bubble{background:#6366f1;color:#fff;border-bottom-right-radius:4px}
    .msg-meta{font-size:10.5px;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .msg-row:not(.mine) .msg-meta{color:#94a3b8}
    .msg-row.mine .msg-meta{color:rgba(255,255,255,.65);flex-direction:row-reverse}
    .msg-sender{font-weight:600}
    .msg-note{background:#fef9c3;border:1px solid #fde68a;color:#854d0e;border-radius:12px;padding:9px 13px;max-width:65%;font-size:13px;border-bottom-left-radius:4px}
    .msg-note-label{font-size:10.5px;font-weight:700;color:#d97706;margin-bottom:3px}
    .msg-system{text-align:center;font-size:12px;color:#94a3b8;font-style:italic;margin:2px 0}
    .chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#94a3b8;font-size:13px;gap:8px}
    .chat-empty svg{width:48px;height:48px;opacity:.25}

    /* ── input area ── */
    .chat-input-area{padding:12px 16px;border-top:1px solid #f1f5f9;background:#fff;flex-shrink:0}
    .chat-input-row{display:flex;gap:8px;align-items:flex-end}
    .chat-textarea{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 12px;font-size:13.5px;outline:none;font-family:inherit;resize:none;min-height:42px;max-height:120px;overflow-y:auto;transition:border .15s;line-height:1.5}
    .chat-textarea:focus{border-color:#6366f1}
    .chat-send-btn{width:40px;height:40px;border-radius:10px;background:#6366f1;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
    .chat-send-btn:hover{background:#4f46e5}
    .chat-send-btn:disabled{background:#cbd5e1;cursor:default}
    .chat-note-btn{width:40px;height:40px;border-radius:10px;background:#fef9c3;color:#d97706;border:1.5px solid #fde68a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:background .15s}
    .chat-note-btn:hover{background:#fde68a}
    .chat-input-hint{font-size:11px;color:#94a3b8;margin-top:5px}

    /* ── placeholder ── */
    .chat-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#94a3b8;font-size:13px;gap:8px;background:#fafbfc}
    .chat-placeholder svg{width:56px;height:56px;opacity:.2}
    .chat-placeholder h3{font-size:16px;font-weight:600;color:#64748b;margin:0}

    /* ── responsive ── */
    @media(max-width:700px){
      .chat-sidebar{width:56px;min-width:56px}
      .channel-name,.channel-preview,.channel-section-label,.chat-sidebar-search,.chat-add-thread{display:none}
      .channel-item{padding:10px;justify-content:center}
      .chat-channel-search{display:none}
    }
  </style>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo"><span style="color:#c9a84c">wana</span>go</div>
  <div class="loader-spinner"></div>
</div>

<div class="app">
  <aside id="sidebar" class="sidebar"></aside>

  <div id="main" style="display:flex;flex-direction:column;overflow:hidden">

    <!-- Topbar -->
    <div class="topbar" style="flex-shrink:0">
      <div class="topbar-title">Team Chat</div>
      <div class="topbar-actions">
        <div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div>
      </div>
    </div>

    <!-- Chat Layout -->
    <div class="chat-wrap">

      <!-- Channels Sidebar -->
      <div class="chat-sidebar">
        <div class="chat-sidebar-hdr">
          <span class="chat-sidebar-title">💬 Channels</span>
        </div>
        <div class="chat-sidebar-search">
          <input class="chat-channel-search" id="channel-search" type="search" placeholder="Search channels…" oninput="renderChannelList()"/>
        </div>
        <div class="chat-channels" id="channel-list"></div>
        <div class="chat-add-thread">
          <select class="chat-add-select" id="add-thread-select" onchange="onAddThread()">
            <option value="">+ Open booking / customer thread</option>
          </select>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="chat-main" id="chat-main">
        <div class="chat-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <h3>Select a channel to start chatting</h3>
          <div>Messages sync in real time across your team</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/chat.js"></script>
</body>
</html>

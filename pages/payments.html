<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanago™ ERP — Payments</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div><div class="loader-brand"><span class="w">wana</span><span class="g">go</span><span class="tm">™</span></div><div class="loader-text">Loading…</div></div>
<div class="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <div class="topbar"><div class="topbar-title">Payments & Dues</div><div class="topbar-actions"><div class="search-wrap"><svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-inp" id="pay-search" type="text" placeholder="Search payments..." oninput="renderPayments()" autocomplete="off"/></div><button class="btn btn-primary" onclick="openRecordPaymentModal()">+ Record Payment</button><div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div></div></div>
    <div id="content"><div class="page active">

      <!-- Stats -->
      <div class="stats-grid g4" id="pay-strip" style="margin-bottom:18px"></div>

      <!-- Collection Radar -->
      <div id="pay-collection-radar" style="margin-bottom:18px"></div>

      <!-- Method Breakdown -->
      <div id="pay-method-cards" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px"></div>

      <!-- Toolbar -->
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;box-shadow:var(--sh)">
        <div class="filter-bar" style="margin:0;flex:1;flex-wrap:wrap">
          <div class="chip active" onclick="filterPayments('all',this)">All</div>
          <div class="chip" onclick="filterPayments('UPI',this)">UPI</div>
          <div class="chip" onclick="filterPayments('Bank Transfer',this)">Bank</div>
          <div class="chip" onclick="filterPayments('Cash',this)">Cash</div>
          <div class="chip" onclick="filterPayments('Cheque',this)">Cheque</div>
          <div class="chip" onclick="filterPayments('Card',this)">Card</div>
        </div>
        <select id="pay-sort" onchange="renderPayments()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:11.5px;color:var(--text);background:var(--cream);font-family:inherit;cursor:pointer;outline:none"><option value="newest">Newest</option><option value="oldest">Oldest</option><option value="amount-desc">Amount ↓</option><option value="amount-asc">Amount ↑</option></select>
        <input type="date" id="pay-date-from" onchange="renderPayments()" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:11px;background:var(--cream);font-family:inherit;outline:none" title="From">
        <span style="font-size:11px;color:var(--textd)">→</span>
        <input type="date" id="pay-date-to" onchange="renderPayments()" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:11px;background:var(--cream);font-family:inherit;outline:none" title="To">
        <button class="btn btn-sm btn-outline" onclick="clearPayDateFilter()" style="padding:6px 8px;font-size:11px">✕</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table><thead><tr><th>Receipt #</th><th>Booking</th><th>Customer</th><th>Amount</th><th>Method</th><th>Reference</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="payments-tbody"></tbody></table>
      </div>

      <!-- Receipt Drawer -->
      <div id="pay-drawer-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:900;backdrop-filter:blur(2px)" onclick="closePayDrawer()"></div>
      <div id="pay-drawer" style="display:none;position:fixed;top:0;right:0;width:440px;height:100vh;background:var(--white);box-shadow:-4px 0 32px rgba(0,0,0,.15);z-index:901;overflow-y:auto;padding:28px 24px"></div>

    </div></div>
  </div>
</div>

<!-- RECORD PAYMENT MODAL -->
<div class="modal-overlay" id="modal-record-payment">
  <div class="modal">
    <div class="modal-title">Record Payment</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Select Booking *</label><select class="form-select" id="rp-booking" onchange="onRPBookingChange()"><option value="">Select booking</option></select></div>
      <div class="form-group"><label class="form-label">Amount (₹) *</label><input class="form-input" type="number" id="rp-amount" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Method</label><select class="form-select" id="rp-method"><option>Bank Transfer</option><option>UPI</option><option>Cash</option><option>Cheque</option><option>Card</option></select></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="rp-date"></div>
      <div class="form-group"><label class="form-label">Reference / Transaction ID</label><input class="form-input" id="rp-ref" placeholder="UTR / Ref number"></div>
    </div>
    <div id="rp-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-record-payment')">Cancel</button><button class="btn btn-primary" onclick="saveRecordPayment()">Record Payment</button></div>
  </div>
</div>

<div id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>
<script src="../js/sidebar.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/constants.js"></script>
  <script src="../js/helpers.js"></script>
  <script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/db.js"></script>
<script src="../js/services.js"></script>
<script src="../js/rbac.js"></script>
<script src="../js/whatsapp.js"></script>
<script src="../js/payments.js"></script>
<script src="../js/wanago-space.js"></script>
<script src="../js/notify.js"></script>
<script src="../js/scheduler.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanago™ ERP — Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div><div class="loader-brand"><span class="w">wana</span><span class="g">go</span><span class="tm">™</span></div><div class="loader-text">Loading…</div></div>
<div class="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <div class="topbar"><div class="topbar-title">Booking Management</div><div class="topbar-actions"><div class="search-wrap"><svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-inp" id="bk-search" type="text" placeholder="Search ref, customer..." oninput="renderBookings()" autocomplete="off"/></div><div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div></div></div>
    <div id="content"><div class="page active">

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:18px" id="bk-stats"></div>

      <!-- AI Insights Strip -->
      <div id="bk-ai-strip" style="margin-bottom:0"></div>

      <!-- Tabs -->
      <div class="tab-bar">
        <div class="tab active" onclick="switchBkTab(this,'bk-table')">📋 All Bookings</div>
        <div class="tab" onclick="switchBkTab(this,'bk-timeline')">📅 Timeline</div>
        <div class="tab" onclick="switchBkTab(this,'bk-kanban')">🗂️ Pipeline</div>
      </div>

      <!-- TABLE -->
      <div class="tab-content active" id="bk-table">
        <div class="table-wrap">
          <div class="table-toolbar" style="flex-wrap:wrap;gap:8px">
            <div class="filter-bar" style="margin:0;flex:1;flex-wrap:wrap">
              <div class="chip active" onclick="filterBookings('all',this)">All</div>
              <div class="chip" onclick="filterBookings('pending',this)">⏳ Pending</div>
              <div class="chip" onclick="filterBookings('confirmed',this)">✅ Confirmed</div>
              <div class="chip" onclick="filterBookings('completed',this)">🏁 Completed</div>
              <div class="chip" onclick="filterBookings('cancelled',this)">❌ Cancelled</div>
            </div>
            <select id="bk-agent-filter" class="form-select" style="width:140px;font-size:11.5px;padding:6px 10px" onchange="renderBookings()"><option value="">All Agents</option></select>
            <select id="bk-pay-filter" class="form-select" style="width:130px;font-size:11.5px;padding:6px 10px" onchange="renderBookings()"><option value="">All Payments</option><option value="unpaid">Unpaid</option><option value="partial">Partial</option><option value="paid">Fully Paid</option></select>
            <button id="bk-urgency-btn" class="btn btn-sm btn-outline" onclick="toggleBkUrgencySort()" title="Sort by departure urgency — soonest first" style="font-size:11.5px;padding:6px 12px;white-space:nowrap">🚨 Sort Urgent</button>
          </div>
          <table><thead><tr><th>Ref</th><th>Customer</th><th>Destination</th><th>Travel Date</th><th>Pax</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Profit</th><th>Status</th><th>Payment</th><th>Actions</th></tr></thead><tbody id="bookings-tbody"></tbody></table>
        </div>
      </div>

      <!-- TIMELINE -->
      <div class="tab-content" id="bk-timeline">
        <div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="card-title">🗓️ Upcoming Departures</div><input type="month" id="bk-tl-month" class="form-input" style="width:150px;font-size:12px;padding:6px 10px" oninput="renderBkTimeline()"></div><div id="bk-timeline-grid"></div></div>
      </div>

      <!-- KANBAN -->
      <div class="tab-content" id="bk-kanban">
        <div id="bk-kanban-board" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start"></div>
      </div>

    </div></div>
  </div>
</div>

<!-- VIEW BOOKING MODAL -->
<div class="modal-overlay" id="modal-view-booking">
  <div class="modal modal-lg">
    <div class="modal-title" id="vb-title">Booking Details</div>
    <div id="vb-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-view-booking')">Close</button>
      <button class="btn btn-outline" onclick="viewBookingInvoice(document.getElementById('modal-view-booking')._bookingId)" id="vb-inv-btn">🧾 Invoice</button>
    </div>
  </div>
</div>

<div id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>
<script src="../js/sidebar.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/db.js"></script>
<script src="../js/whatsapp.js"></script>
<script type="module" src="../js/bookings.js"></script>
<script src="../js/wanago-space.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Documents & PNR — Wanago ERP</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    /* ── layout ── */
    .docs-wrap{display:flex;height:calc(100vh - 56px);overflow:hidden}
    .docs-list{width:380px;min-width:320px;flex-shrink:0;border-right:1px solid #e8ecf0;overflow-y:auto;background:#fafafa}
    .docs-panel{flex:1;overflow-y:auto;background:#fff}

    /* ── list header ── */
    .docs-list-hdr{padding:14px 16px;border-bottom:1px solid #e8ecf0;background:#fff;position:sticky;top:0;z-index:2}
    .docs-search{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 11px;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box}
    .docs-search:focus{border-color:#6366f1}
    .docs-filters{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
    .docs-filter{padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;transition:all .15s}
    .docs-filter.active{background:#6366f1;color:#fff;border-color:#6366f1}

    /* ── booking card ── */
    .doc-card{padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;position:relative}
    .doc-card:hover{background:#f0f4ff}
    .doc-card.selected{background:#eef2ff;border-left:3px solid #6366f1}
    .doc-card:not(.selected){border-left:3px solid transparent}
    .doc-card-id{font-size:11px;font-weight:700;color:#6366f1;margin-bottom:2px}
    .doc-card-name{font-size:13px;font-weight:600;color:#1e293b}
    .doc-card-sub{font-size:11.5px;color:#64748b;margin-top:1px}
    .doc-progress-bar{height:4px;background:#e2e8f0;border-radius:99px;margin-top:7px;overflow:hidden}
    .doc-progress-fill{height:100%;border-radius:99px;transition:width .3s}
    .doc-progress-label{font-size:10.5px;color:#94a3b8;margin-top:3px}

    /* ── empty state ── */
    .docs-empty{padding:48px 24px;text-align:center;color:#94a3b8;font-size:13px}

    /* ── panel ── */
    .panel-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:13px;gap:8px}
    .panel-placeholder svg{width:48px;height:48px;opacity:.25}
    .panel-hdr{padding:18px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .panel-booking-id{font-size:11px;font-weight:700;color:#6366f1}
    .panel-booking-name{font-size:17px;font-weight:700;color:#1e293b;margin-top:2px}
    .panel-booking-sub{font-size:12.5px;color:#64748b;margin-top:3px}
    .panel-body{padding:20px 24px}
    .panel-section{margin-bottom:24px}
    .panel-section-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:12px;display:flex;align-items:center;gap:6px}

    /* ── checklist ── */
    .checklist{display:flex;flex-direction:column;gap:0;border:1px solid #e8ecf0;border-radius:12px;overflow:hidden}
    .checklist-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;user-select:none}
    .checklist-item:last-child{border-bottom:none}
    .checklist-item:hover{background:#f8fafc}
    .checklist-item.done{background:#f0fdf4}
    .checklist-item.done:hover{background:#dcfce7}
    .check-box{width:20px;height:20px;border-radius:6px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .checklist-item.done .check-box{background:#22c55e;border-color:#22c55e;color:#fff}
    .check-emoji{font-size:16px;flex-shrink:0}
    .check-label{font-size:13px;font-weight:500;color:#334155;flex:1}
    .checklist-item.done .check-label{color:#166534}
    .check-date{font-size:11px;color:#94a3b8}

    /* ── pnr table ── */
    .pnr-table{width:100%;border-collapse:collapse;font-size:13px}
    .pnr-table th{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;background:#fafafa;border-bottom:1px solid #f1f5f9}
    .pnr-table td{padding:9px 10px;border-bottom:1px solid #f8fafc;vertical-align:middle}
    .pnr-table tr:last-child td{border-bottom:none}
    .pnr-code{font-family:monospace;font-size:13px;font-weight:700;color:#6366f1;background:#eef2ff;padding:2px 7px;border-radius:5px}

    /* ── modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:16px;width:min(540px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #f1f5f9}
    .modal-hdr h3{font-size:16px;font-weight:700;color:#1e293b;margin:0}
    .modal-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer}
    .modal-body{padding:20px 22px}
    .modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end}

    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .form-label{font-size:12px;font-weight:600;color:#475569}
    .form-input,.form-select{border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;background:#fff;transition:border .15s}
    .form-input:focus,.form-select:focus{border-color:#6366f1}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
    .btn-outline{background:#fff;color:#475569;border:1.5px solid #e2e8f0}.btn-outline:hover{border-color:#6366f1;color:#6366f1}
    .btn-sm{padding:5px 12px;font-size:12px}
    .btn-danger-sm{background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer}
    .btn-add{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px dashed #cbd5e1;background:transparent;color:#64748b;transition:all .15s;width:100%;justify-content:center}
    .btn-add:hover{border-color:#6366f1;color:#6366f1}

    /* ── status badge ── */
    .chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
    .chip-green{background:#dcfce7;color:#166534}
    .chip-amber{background:#fef9c3;color:#854d0e}
    .chip-blue{background:#dbeafe;color:#1e40af}
    .chip-gray{background:#f1f5f9;color:#475569}

    /* ── responsive ── */
    @media(max-width:768px){
      .docs-wrap{flex-direction:column;height:auto}
      .docs-list{width:100%;border-right:none;border-bottom:1px solid #e8ecf0}
      .docs-panel{min-height:400px}
    }
  </style>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo"><span style="color:#c9a84c">wana</span>go</div>
  <div class="loader-spinner"></div>
</div>

<div class="app">
  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content" style="display:flex;flex-direction:column;overflow:hidden">

    <!-- Topbar -->
    <div class="topbar" style="flex-shrink:0">
      <div class="topbar-left">
        <button class="topbar-menu-btn" onclick="toggleSidebar()">&#9776;</button>
        <span class="topbar-title">Documents & PNR</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="topbar-user"></span>
        <button class="btn-icon" onclick="handleLogout()" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Two-Panel Layout -->
    <div class="docs-wrap">

      <!-- LEFT: Booking List -->
      <div class="docs-list">
        <div class="docs-list-hdr">
          <input class="docs-search" id="docs-search" type="search" placeholder="Search by name, booking ID, package…" oninput="renderDocList()"/>
          <div class="docs-filters">
            <button class="docs-filter active" id="df-all"        onclick="setDocFilter('all')">All</button>
            <button class="docs-filter"        id="df-incomplete" onclick="setDocFilter('incomplete')">Incomplete</button>
            <button class="docs-filter"        id="df-complete"   onclick="setDocFilter('complete')">Complete</button>
            <button class="docs-filter"        id="df-upcoming"   onclick="setDocFilter('upcoming')">Upcoming</button>
          </div>
        </div>
        <div id="docs-list-body">
          <div class="docs-empty">Loading bookings…</div>
        </div>
      </div>

      <!-- RIGHT: Detail Panel -->
      <div class="docs-panel" id="docs-panel">
        <div class="panel-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <div>Select a booking to manage documents</div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ── Add PNR Modal ── -->
<div class="modal-overlay" id="modal-pnr">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="pnr-modal-title">Add PNR / Ticket</h3>
      <button class="modal-close" onclick="closePnrModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pnr-edit-idx"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Passenger Name *</label>
          <input class="form-input" id="pnr-name" placeholder="e.g. Rahul Sharma"/>
        </div>
        <div class="form-group">
          <label class="form-label">PNR / Ticket No. *</label>
          <input class="form-input" id="pnr-code" placeholder="e.g. XYZ123" style="text-transform:uppercase"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Airline / Operator</label>
          <input class="form-input" id="pnr-airline" placeholder="e.g. IndiGo"/>
        </div>
        <div class="form-group">
          <label class="form-label">Flight / Train No.</label>
          <input class="form-input" id="pnr-flight" placeholder="e.g. 6E 205"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Sector</label>
          <input class="form-input" id="pnr-sector" placeholder="e.g. DEL → DXB"/>
        </div>
        <div class="form-group">
          <label class="form-label">Seat No.</label>
          <input class="form-input" id="pnr-seat" placeholder="e.g. 14A"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Departure Date</label>
          <input class="form-input" type="date" id="pnr-date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Departure Time</label>
          <input class="form-input" type="time" id="pnr-time"/>
        </div>
      </div>
      <div id="pnr-error" style="color:#ef4444;font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closePnrModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePnrRecord()">Save</button>
    </div>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/docs.js"></script>

</body>
</html>

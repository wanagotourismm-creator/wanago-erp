<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanago™ ERP — Support</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div><div class="loader-brand"><span class="w">wana</span><span class="g">go</span><span class="tm">™</span></div><div class="loader-text">Loading…</div></div>
<div class="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <div class="topbar">
      <div class="topbar-title">Support Tickets</div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openNewTicketModal()">+ New Ticket</button>
        <div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div>
      </div>
    </div>
    <div id="content"><div class="page active">

      <!-- Stats -->
      <div class="stats-grid g4" id="tkt-stats" style="margin-bottom:16px"></div>

      <!-- AI Strip -->
      <div id="tkt-ai-strip" style="margin-bottom:16px"></div>

      <!-- Filters -->
      <div class="table-wrap">
        <div class="table-toolbar">
          <div class="filter-bar" style="margin:0">
            <div class="chip active" onclick="filterTickets('open',this)">Open</div>
            <div class="chip" onclick="filterTickets('in_progress',this)">In Progress</div>
            <div class="chip" onclick="filterTickets('resolved',this)">Resolved</div>
            <div class="chip" onclick="filterTickets('closed',this)">Closed</div>
            <div class="chip" onclick="filterTickets('all',this)">All</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap">
            <div class="search-wrap"><svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-inp" id="tkt-search" type="text" placeholder="Search ticket, customer…" oninput="renderSupport()" autocomplete="off"/></div>
            <select class="form-select" id="tkt-type-filter" onchange="renderSupport()" style="height:32px;font-size:12px;width:150px">
              <option value="">All Types</option>
              <option value="complaint">😠 Complaint</option>
              <option value="query">❓ Query</option>
              <option value="refund_request">💸 Refund Request</option>
              <option value="change_request">✏️ Change Request</option>
              <option value="feedback">⭐ Feedback</option>
            </select>
            <select class="form-select" id="tkt-assign-filter" onchange="renderSupport()" style="height:32px;font-size:12px;width:140px">
              <option value="">All Assignees</option>
            </select>
          </div>
        </div>
        <table>
          <thead><tr>
            <th>Ticket ID</th>
            <th>Customer</th>
            <th>Subject</th>
            <th>Type</th>
            <th>Priority</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Age</th>
            <th>Actions</th>
          </tr></thead>
          <tbody id="tkt-tbody"></tbody>
        </table>
      </div>

    </div></div>
  </div>
</div>

<!-- ADD / EDIT TICKET MODAL -->
<div class="modal-overlay" id="modal-add-ticket">
  <div class="modal" style="max-width:580px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="modal-title" id="tkt-modal-title" style="margin-bottom:0">New Support Ticket</div>
      <button onclick="closeModal('modal-add-ticket')" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--textd);padding:4px 8px;line-height:1">✕</button>
    </div>
    <input type="hidden" id="tkt-edit-id">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Customer Name *</label>
        <input class="form-input" id="tkt-customer" placeholder="Customer's full name">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="tkt-phone" placeholder="Contact number">
      </div>
      <div class="form-group">
        <label class="form-label">Booking Ref</label>
        <input class="form-input" id="tkt-bkref" placeholder="BK-XXXX (optional)">
      </div>
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select class="form-select" id="tkt-type">
          <option value="query">❓ Query</option>
          <option value="complaint">😠 Complaint</option>
          <option value="refund_request">💸 Refund Request</option>
          <option value="change_request">✏️ Change Request</option>
          <option value="feedback">⭐ Feedback</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="tkt-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
          <option value="urgent">🚨 Urgent</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="tkt-status">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Subject *</label>
        <input class="form-input" id="tkt-subject" placeholder="Brief summary of the issue">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="tkt-description" rows="3" placeholder="Detailed description of the issue…" style="resize:vertical"></textarea>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Assigned To</label>
        <input class="form-input" id="tkt-assigned" placeholder="Team member name">
      </div>
    </div>
    <div id="tkt-error" class="form-error" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-ticket')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTicket()">💾 Save Ticket</button>
    </div>
  </div>
</div>

<!-- VIEW TICKET MODAL -->
<div class="modal-overlay" id="modal-view-ticket">
  <div class="modal modal-lg">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="modal-title" id="vt-title" style="margin-bottom:0">Ticket Details</div>
      <button onclick="closeModal('modal-view-ticket')" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--textd);padding:4px 8px;line-height:1">✕</button>
    </div>
    <div id="vt-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-view-ticket')">Close</button>
    </div>
  </div>
</div>

<div id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>
<script src="../js/sidebar.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/db.js"></script>
<script src="../js/services.js"></script>
<script src="../js/rbac.js"></script>
<script src="../js/support.js"></script>
<script src="../js/wanago-space.js"></script>
<script src="../js/notify.js"></script>
</body>
</html>

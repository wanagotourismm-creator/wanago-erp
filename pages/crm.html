<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Advanced CRM — Wanago ERP</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <link rel="stylesheet" href="../styles/design-system.css"/>
  <style>
    /* ── tabs ── */
    .crm-tabs{display:flex;gap:6px;background:#f1f5f9;border-radius:10px;padding:4px;margin:14px 24px 0;width:fit-content}
    .crm-tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .15s}
    .crm-tab.active{background:#fff;color:#1e293b;box-shadow:0 1px 4px rgba(0,0,0,.1)}

    /* ── stats strip ── */
    .crm-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px 24px 0}
    .crm-stat{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #e8ecf0;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s}
    .crm-stat:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .crm-stat-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .crm-stat-num{font-size:22px;font-weight:700;line-height:1}
    .crm-stat-label{font-size:11.5px;color:#64748b;margin-top:2px}
    @media(max-width:900px){.crm-stats{grid-template-columns:repeat(3,1fr)}}

    /* ── section ── */
    .crm-section{background:#fff;border-radius:14px;border:1px solid #e8ecf0;margin:14px 24px 0;overflow:hidden}
    .crm-section:last-child{margin-bottom:24px}
    .crm-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f1f5f9}
    .crm-section-title{font-size:14px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:7px}
    .crm-body{padding:16px 18px}

    /* ── pipeline kanban ── */
    .pipeline-wrap{display:flex;gap:10px;padding:14px 18px 18px;overflow-x:auto}
    .pipeline-col{min-width:200px;width:200px;flex-shrink:0}
    .pipeline-col-hdr{padding:8px 10px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
    .pipeline-col-label{font-size:12px;font-weight:700}
    .pipeline-col-count{background:rgba(0,0,0,.1);border-radius:99px;font-size:10.5px;font-weight:700;padding:1px 7px}
    .pipeline-col-value{font-size:10px;margin-top:1px;opacity:.7}
    .pipeline-cards{min-height:80px;display:flex;flex-direction:column;gap:7px;border-radius:8px;padding:4px;transition:background .15s}
    .pipeline-cards.drag-over{background:#eef2ff;outline:2px dashed #6366f1;outline-offset:2px}
    .pipeline-card{background:#fff;border:1.5px solid #e8ecf0;border-radius:10px;padding:10px 11px;cursor:grab;transition:all .15s;position:relative}
    .pipeline-card:active{cursor:grabbing}
    .pipeline-card:hover{border-color:#6366f1;box-shadow:0 3px 10px rgba(99,102,241,.12)}
    .pipeline-card.dragging{opacity:.4}
    .pc-name{font-size:12.5px;font-weight:700;color:#1e293b;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pc-dest{font-size:11px;color:#64748b;margin-bottom:5px;display:flex;align-items:center;gap:4px}
    .pc-meta{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
    .pc-budget{font-size:11.5px;font-weight:600;color:#166534}
    .pc-score{font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 6px}
    .pc-score.hot{background:#fee2e2;color:#991b1b}
    .pc-score.warm{background:#fef9c3;color:#854d0e}
    .pc-score.cool{background:#dbeafe;color:#1e40af}
    .pc-followup{font-size:10px;color:#94a3b8;margin-top:4px}
    .pc-followup.overdue{color:#ef4444;font-weight:600}
    .pc-actions{display:none;position:absolute;top:6px;right:6px;gap:3px}
    .pipeline-card:hover .pc-actions{display:flex}
    .pc-btn{width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
    .pc-btn-log{background:#eef2ff;color:#6366f1}
    .pc-btn-next{background:#dcfce7;color:#166534}

    /* ── follow-up queue ── */
    .fu-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #f8fafc}
    .fu-item:last-child{border-bottom:none}
    .fu-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .fu-name{font-size:13px;font-weight:600;color:#1e293b}
    .fu-sub{font-size:11.5px;color:#64748b;margin-top:1px}
    .fu-date{font-size:11.5px;font-weight:600;flex-shrink:0;text-align:right}
    .fu-date.overdue{color:#ef4444}
    .fu-date.today{color:#f59e0b}
    .fu-date.upcoming{color:#6366f1}

    /* ── leaderboard ── */
    .lb-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f8fafc;cursor:pointer;transition:background .1s;border-radius:6px;padding:8px 6px}
    .lb-row:last-child{border-bottom:none}
    .lb-row:hover{background:#f8fafc}
    .lb-rank{width:22px;font-size:11.5px;font-weight:700;color:#94a3b8;text-align:center;flex-shrink:0}
    .lb-rank.top{color:#f59e0b}
    .lb-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-size:13px;font-weight:600;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-sub{font-size:11px;color:#64748b}
    .lb-score-bar{width:80px;height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden;flex-shrink:0}
    .lb-score-fill{height:100%;border-radius:4px;transition:width .4s}
    .lb-score-val{font-size:12px;font-weight:700;flex-shrink:0;min-width:28px;text-align:right}

    /* ── activity feed ── */
    .act-item{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid #f8fafc}
    .act-item:last-child{border-bottom:none}
    .act-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .act-text{font-size:13px;color:#334155;flex:1}
    .act-text strong{color:#1e293b}
    .act-time{font-size:11px;color:#94a3b8;flex-shrink:0}

    /* ── chips ── */
    .chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}

    /* ── buttons ── */
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
    .btn-outline{background:#fff;color:#475569;border:1.5px solid #e2e8f0}.btn-outline:hover{border-color:#6366f1;color:#6366f1}
    .btn-sm{padding:5px 12px;font-size:12px}

    /* ── modals ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:16px;width:min(520px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #f1f5f9}
    .modal-hdr h3{font-size:16px;font-weight:700;color:#1e293b;margin:0}
    .modal-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer}
    .modal-body{padding:20px 22px}
    .modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .form-label{font-size:12px;font-weight:600;color:#475569}
    .form-input,.form-select,.form-textarea{border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;background:#fff;transition:border .15s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#6366f1}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* ── activity timeline ── */
    .act-timeline{display:flex;flex-direction:column;gap:0}
    .act-tl-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
    .act-tl-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:30px;bottom:0;width:2px;background:#f1f5f9}
    .act-tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1}
    .act-tl-content{flex:1}
    .act-tl-text{font-size:13px;color:#334155}
    .act-tl-meta{font-size:11px;color:#94a3b8;margin-top:2px}
  </style>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo"><span style="color:#c9a84c">wana</span>go</div>
  <div class="loader-spinner"></div>
</div>

<div class="app">
  <aside id="sidebar" class="sidebar"></aside>

  <div id="main" style="overflow-y:auto">

    <!-- Topbar -->
    <div class="topbar">
      <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">Advanced CRM</div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="goTo('leads')">+ New Lead</button>
        <div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="crm-tabs">
      <button class="crm-tab active" id="crm-tab-pipeline"  onclick="setCrmTab('pipeline')">🏆 Pipeline</button>
      <button class="crm-tab"        id="crm-tab-followups" onclick="setCrmTab('followups')">📅 Follow-ups</button>
      <button class="crm-tab"        id="crm-tab-leads"     onclick="setCrmTab('leads')">🔥 Hot Leads</button>
      <button class="crm-tab"        id="crm-tab-activity"  onclick="setCrmTab('activity')">📋 Activity Log</button>
    </div>

    <!-- Stats -->
    <div class="crm-stats" id="crm-stats"></div>

    <!-- Content -->
    <div id="crm-content"></div>

  </div>
</div>

<!-- ── Log Activity Modal ── -->
<div class="modal-overlay" id="modal-activity">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="act-modal-title">Log Activity</h3>
      <button class="modal-close" onclick="closeActivityModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="act-lead-preview" style="background:#f8fafc;border-radius:10px;padding:10px 14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:#6366f1" id="act-lead-id"></div>
        <div style="font-size:14px;font-weight:600;color:#1e293b;margin-top:2px" id="act-lead-name"></div>
        <div style="font-size:12px;color:#64748b;margin-top:1px" id="act-lead-sub"></div>
      </div>
      <input type="hidden" id="act-lead-id-input"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Activity Type *</label>
          <select class="form-select" id="act-type">
            <option value="call">📞 Phone Call</option>
            <option value="whatsapp">💬 WhatsApp</option>
            <option value="email">📧 Email</option>
            <option value="meeting">🤝 Meeting</option>
            <option value="quote">📋 Quotation Sent</option>
            <option value="note">📝 Note</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date & Time</label>
          <input class="form-input" type="datetime-local" id="act-datetime"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes / Outcome *</label>
        <textarea class="form-textarea" id="act-note" placeholder="What happened? What was discussed? Next steps?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Move Stage To</label>
          <select class="form-select" id="act-stage">
            <option value="">— Keep current stage —</option>
            <option value="contacted">Contacted</option>
            <option value="follow_up">Follow-up</option>
            <option value="quoted">Quoted</option>
            <option value="negotiation">Negotiation</option>
            <option value="won">Won ✅</option>
            <option value="lost">Lost ❌</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Next Follow-up</label>
          <input class="form-input" type="date" id="act-followup"/>
        </div>
      </div>
      <div id="act-error" style="color:#ef4444;font-size:12px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeActivityModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveActivity()">Save Activity</button>
    </div>
  </div>
</div>

<!-- ── Lead Detail Modal ── -->
<div class="modal-overlay" id="modal-lead-detail">
  <div class="modal-box" style="width:min(600px,95vw)">
    <div class="modal-hdr">
      <h3 id="ld-title">Lead Details</h3>
      <button class="modal-close" onclick="closeLeadDetail()">✕</button>
    </div>
    <div class="modal-body" id="ld-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeLeadDetail()">Close</button>
      <button class="btn btn-primary" id="ld-log-btn">+ Log Activity</button>
    </div>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/crm.js"></script>
</body>
</html>

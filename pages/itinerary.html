<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Wanago™ ERP — Itinerary Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    /* ── BUILDER LAYOUT ── */
    .itin-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;padding:14px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--sh)}
    .itin-toolbar-info{flex:1;min-width:0}
    .itin-trip-title{font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .itin-trip-meta{font-size:11.5px;color:var(--textd);margin-top:2px}
    .itin-actions{display:flex;gap:7px;flex-wrap:wrap}
    .itin-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:.15s}
    .itin-btn:hover{background:var(--cream)}
    .itin-btn.primary{background:var(--g700);color:#fff;border-color:var(--g700)}
    .itin-btn.primary:hover{background:var(--g600)}
    .itin-btn.wa{background:#25d366;color:#fff;border-color:#25d366}
    .itin-btn.pdf{background:#dc2626;color:#fff;border-color:#dc2626}

    /* ── DAYS ── */
    #days-container{display:flex;flex-direction:column;gap:14px}
    .day-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh);transition:.2s}
    .day-card.drag-over{border-color:var(--g400);box-shadow:0 0 0 2px var(--g200)}
    .day-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(90deg,var(--cream),var(--cream2));border-bottom:1px solid var(--border);cursor:grab}
    .day-num-badge{background:var(--g700);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
    .day-date-lbl{font-size:12px;color:var(--textd);font-weight:500}
    .day-title-inp{flex:1;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text);outline:none;padding:2px 4px;border-radius:4px;min-width:120px}
    .day-title-inp:focus{background:var(--cream2);outline:2px solid var(--g300)}
    .day-header-actions{display:flex;gap:5px;margin-left:auto}
    .day-add-btn{padding:5px 12px;background:var(--g700);color:#fff;border:none;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer}
    .day-del-btn{padding:5px 9px;background:var(--red2);color:var(--red);border:1px solid rgba(192,57,43,.2);border-radius:6px;font-size:12px;cursor:pointer}

    /* ── ITEMS ── */
    .day-items{min-height:50px;padding:8px 12px 10px}
    .day-empty{text-align:center;padding:18px;color:var(--texth);font-size:12px}
    .itin-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;background:var(--white);cursor:grab;transition:.15s;position:relative}
    .itin-item:hover{box-shadow:var(--sh2)}
    .itin-item.drag-over-item{border-color:var(--g400);background:var(--g50)}
    .drag-handle{color:var(--texth);font-size:16px;cursor:grab;flex-shrink:0;line-height:1}
    .item-type-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .item-time-col{font-size:11.5px;font-weight:700;color:var(--text);min-width:44px;text-align:right;flex-shrink:0}
    .item-time-end{font-size:10px;color:var(--textd)}
    .item-body{flex:1;min-width:0}
    .item-title-row{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub-row{font-size:11px;color:var(--textd);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-status-pill{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
    .item-status-confirmed{background:#dcfce7;color:#166534}
    .item-status-pending{background:#fffbeb;color:#92400e}
    .item-status-cancelled{background:#fee2e2;color:#991b1b}
    .item-status-on-request{background:#ede9fe;color:#5b21b6}
    .item-cost-col{font-size:12px;font-weight:700;color:var(--g700);min-width:60px;text-align:right;flex-shrink:0}
    .item-actions-col{display:flex;gap:4px;flex-shrink:0}
    .item-edit-btn,.item-del-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
    .item-edit-btn:hover{background:var(--cream)}
    .item-del-btn:hover{background:var(--red2);color:var(--red)}

    /* ── DROP ZONE ── */
    .drop-zone{height:4px;border-radius:2px;background:var(--g300);margin:4px 0;display:none}
    .drop-zone.active{display:block}

    /* ── ADD DAY ── */
    .add-day-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--cream);border:2px dashed var(--border);border-radius:12px;cursor:pointer;color:var(--textd);font-size:13px;font-weight:600;transition:.2s;margin-top:4px}
    .add-day-btn:hover{border-color:var(--g400);color:var(--g700);background:var(--g50)}

    /* ── COST SUMMARY ── */
    .cost-strip{display:flex;gap:10px;flex-wrap:wrap;padding:10px 14px;background:var(--cream);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
    .cost-item{font-size:12px;color:var(--textd)}
    .cost-item strong{color:var(--g700)}

    /* ── TYPE SELECTOR ── */
    .type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-bottom:16px}
    .type-btn{padding:10px 6px;border:2px solid var(--border);border-radius:9px;cursor:pointer;text-align:center;font-size:10.5px;font-weight:600;color:var(--textd);background:var(--white);transition:.15s}
    .type-btn:hover{border-color:var(--g300);background:var(--cream)}
    .type-btn.selected{border-color:var(--g700);background:var(--g50);color:var(--g700)}
    .type-btn .type-emoji{font-size:18px;display:block;margin-bottom:4px}
    .field-group{display:none}
    .field-group.visible{display:contents}

    /* ── PASSENGER STRIP ── */
    .pax-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .pax-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--cream);border:1px solid var(--border);border-radius:20px;font-size:11.5px}

    /* ── PRINT / PDF ── */
    @media print{
      #sidebar,#main .topbar,.itin-toolbar .itin-actions,.day-header-actions,.item-actions-col,.drag-handle,
      .add-day-btn,.day-add-btn,.day-del-btn,#page-loader,.tab-bar,#itinerary-list-view{display:none!important}
      body,html{background:#fff!important}
      .app{display:block!important}
      #main{margin:0!important;padding:0!important}
      .itin-toolbar{box-shadow:none!important;border:none!important;padding:0 0 12px!important}
      .itin-trip-title{font-size:22px!important}
      .day-card{box-shadow:none!important;break-inside:avoid;page-break-inside:avoid}
      .itin-item{break-inside:avoid}
      .pdf-header{display:block!important}
      .print-footer{display:block!important}
    }
    .pdf-header,.print-footer{display:none}
  </style>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div><div class="loader-brand"><span class="w">wana</span><span class="g">go</span><span class="tm">™</span></div><div class="loader-text">Loading…</div></div>
<div class="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <div class="topbar">
      <div class="topbar-title">🗓️ Itinerary Builder</div>
      <div class="topbar-actions"><div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div></div>
    </div>
    <div id="content"><div class="page active">

      <!-- TAB BAR -->
      <div class="tab-bar" style="margin-bottom:18px">
        <div class="tab itin-tab active" onclick="switchITab(this,'list')">📋 All Itineraries</div>
        <div class="tab itin-tab" id="builder-tab" onclick="switchITab(this,'builder')" style="display:none">🗓️ Builder</div>
      </div>

      <!-- ══ LIST VIEW ══ -->
      <div id="itinerary-list-view">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
          <div style="position:relative;flex:1;max-width:300px"><svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--textd)" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input class="search-inp" id="itin-search" style="width:100%;padding-left:30px;font-size:12px" placeholder="Search itineraries…" oninput="renderItineraryList()"></div>
          <select class="form-select" id="itin-filter" style="width:150px;font-size:12px;padding:7px 10px" onchange="renderItineraryList()"><option value="all">All Status</option><option value="draft">Draft</option><option value="sent">Sent to Customer</option><option value="confirmed">Confirmed</option></select>
          <button class="btn btn-primary" onclick="openNewItineraryModal()">+ New Itinerary</button>
        </div>
        <div id="itin-list-body"></div>
      </div>

      <!-- ══ BUILDER VIEW ══ -->
      <div id="itinerary-builder-view" style="display:none">
        <!-- PDF Header (print only) -->
        <div class="pdf-header" style="margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #134a32">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="font-family:'DM Serif Display',serif;font-size:24px;color:#134a32"><span style="color:#c9a84c">wana</span>go™ Travel</div>
            <div style="text-align:right;font-size:11px;color:#666" id="pdf-company-info"></div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="itin-toolbar">
          <div>
            <button class="itin-btn" onclick="backToList()">← All Itineraries</button>
          </div>
          <div class="itin-toolbar-info">
            <div class="itin-trip-title" id="itin-disp-title">Untitled Itinerary</div>
            <div class="itin-trip-meta" id="itin-disp-meta"></div>
          </div>
          <div class="itin-actions">
            <button class="itin-btn" onclick="editItineraryMeta()">✏️ Edit Trip</button>
            <button class="itin-btn" onclick="openPassengerModal()">👥 Passengers</button>
            <button class="itin-btn pdf" onclick="exportItineraryPDF()">📄 PDF</button>
            <button class="itin-btn wa" onclick="shareItineraryWhatsApp()">💬 WhatsApp</button>
            <select class="form-select" id="itin-status-sel" style="font-size:12px;padding:6px 10px" onchange="changeItineraryStatus(this.value)">
              <option value="draft">Draft</option><option value="sent">Sent to Customer</option><option value="confirmed">Confirmed</option>
            </select>
          </div>
        </div>

        <!-- Passenger strip -->
        <div class="pax-strip" id="pax-strip"></div>

        <!-- Cost summary -->
        <div class="cost-strip" id="cost-strip"></div>

        <!-- Days -->
        <div id="days-container" ondragover="onDayDragOver(event)" ondrop="onDayDrop(event)"></div>

        <!-- Add Day -->
        <div class="add-day-btn" onclick="addDay()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Day
        </div>

        <!-- Print footer -->
        <div class="print-footer" style="margin-top:30px;padding-top:12px;border-top:1px solid #e5e7eb;font-size:10px;color:#666;display:flex;justify-content:space-between">
          <span id="print-footer-left"></span>
          <span>This is a computer generated itinerary.</span>
        </div>
      </div>

    </div></div>
  </div>
</div>

<!-- ══ NEW / EDIT ITINERARY META MODAL ══ -->
<div class="modal-overlay" id="modal-itin-meta">
  <div class="modal modal-lg">
    <div class="modal-title" id="itin-meta-modal-title">New Itinerary</div>
    <input type="hidden" id="meta-edit-id">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Trip Title *</label><input class="form-input" id="meta-title" placeholder="Kerala Honeymoon, Goa Family Trip…"></div>
      <div class="form-group"><label class="form-label">Destination *</label><input class="form-input" id="meta-dest" placeholder="Kerala, Goa, Europe…"></div>
      <div class="form-group"><label class="form-label">Link to Booking</label>
        <select class="form-select" id="meta-booking"><option value="">— Standalone —</option></select>
      </div>
      <div class="form-group"><label class="form-label">Start Date *</label><input class="form-input" type="date" id="meta-start" oninput="calcTripDays()"></div>
      <div class="form-group"><label class="form-label">End Date *</label><input class="form-input" type="date" id="meta-end" oninput="calcTripDays()"></div>
      <div class="form-group"><label class="form-label">Duration</label><div id="meta-duration-preview" style="font-size:13px;font-weight:700;color:var(--g700);padding:8px 0">—</div></div>
      <div class="form-group"><label class="form-label">Adults</label><input class="form-input" type="number" id="meta-adults" value="2" min="1"></div>
      <div class="form-group"><label class="form-label">Children</label><input class="form-input" type="number" id="meta-children" value="0" min="0"></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Notes / Special Instructions</label><textarea class="form-textarea" id="meta-notes" rows="2" placeholder="Any special requirements…"></textarea></div>
    </div>
    <div id="meta-error" style="color:var(--red);font-size:12px;display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-itin-meta')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItineraryMeta()">Save &amp; Continue</button>
    </div>
  </div>
</div>

<!-- ══ ADD / EDIT ITEM MODAL ══ -->
<div class="modal-overlay" id="modal-add-item">
  <div class="modal modal-lg" style="max-height:92vh;overflow-y:auto">
    <div class="modal-title" id="add-item-title">Add Item</div>
    <input type="hidden" id="item-edit-day">
    <input type="hidden" id="item-edit-idx">

    <!-- Type selector -->
    <div class="type-grid" id="type-grid"></div>
    <input type="hidden" id="item-type" value="flight">

    <!-- Common fields -->
    <div class="form-grid" style="margin-bottom:4px">
      <div class="form-group"><label class="form-label">Time</label><input class="form-input" type="time" id="item-time"></div>
      <div class="form-group"><label class="form-label">End Time</label><input class="form-input" type="time" id="item-endtime"></div>
      <div class="form-group"><label class="form-label">Title / Label *</label><input class="form-input" id="item-title" placeholder="Auto-filled or custom…"></div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="item-status">
          <option value="confirmed">Confirmed</option><option value="pending">Pending</option>
          <option value="on-request">On Request</option><option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Cost (₹)</label><input class="form-input" type="number" id="item-cost" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Confirmation / Ref #</label><input class="form-input" id="item-ref" placeholder="PNR, Booking ref…"></div>
    </div>

    <!-- FLIGHT FIELDS -->
    <div class="field-group" id="fg-flight">
      <div class="form-section">Flight Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Airline</label><input class="form-input" id="fl-airline" placeholder="IndiGo, Air India…" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">Flight Number</label><input class="form-input" id="fl-no" placeholder="6E-123" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">From (IATA)</label><input class="form-input" id="fl-from" placeholder="DEL" maxlength="5" style="text-transform:uppercase" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">To (IATA)</label><input class="form-input" id="fl-to" placeholder="COK" maxlength="5" style="text-transform:uppercase" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">PNR</label><input class="form-input" id="fl-pnr" placeholder="ABCDEF" style="text-transform:uppercase" oninput="if(this.value)document.getElementById('item-ref').value=this.value"></div>
        <div class="form-group"><label class="form-label">Class</label>
          <select class="form-select" id="fl-class"><option>Economy</option><option>Premium Economy</option><option>Business</option><option>First</option></select>
        </div>
        <div class="form-group"><label class="form-label">Seats</label><input class="form-input" id="fl-seats" placeholder="12A, 12B"></div>
        <div class="form-group"><label class="form-label">Terminal</label><input class="form-input" id="fl-terminal" placeholder="T1, T2…"></div>
      </div>
    </div>

    <!-- HOTEL FIELDS -->
    <div class="field-group" id="fg-hotel">
      <div class="form-section">Hotel Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Hotel Name</label><input class="form-input" id="ht-name" placeholder="Taj Hotel…" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">City / Area</label><input class="form-input" id="ht-city" placeholder="Kochi, Marine Drive…"></div>
        <div class="form-group"><label class="form-label">Check-Out Date</label><input class="form-input" type="date" id="ht-checkout"></div>
        <div class="form-group"><label class="form-label">Room Type</label><input class="form-input" id="ht-room" placeholder="Deluxe, Suite…"></div>
        <div class="form-group"><label class="form-label">No. of Rooms</label><input class="form-input" type="number" id="ht-rooms" value="1" min="1"></div>
        <div class="form-group"><label class="form-label">Meal Plan</label>
          <select class="form-select" id="ht-meal"><option value="EP">EP (Room Only)</option><option value="CP">CP (Breakfast)</option><option value="MAP">MAP (Breakfast+Dinner)</option><option value="AP">AP (All Meals)</option><option value="AI">All Inclusive</option></select>
        </div>
        <div class="form-group"><label class="form-label">Contact Phone</label><input class="form-input" id="ht-phone" placeholder="Hotel number"></div>
        <div class="form-group"><label class="form-label">Conf. No.</label><input class="form-input" id="ht-conf" oninput="if(this.value)document.getElementById('item-ref').value=this.value"></div>
      </div>
    </div>

    <!-- TRANSFER / CAR / TAXI FIELDS -->
    <div class="field-group" id="fg-transfer">
      <div class="form-section">Transfer Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Pickup Point</label><input class="form-input" id="tr-from" placeholder="Airport, Hotel…" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">Drop Point</label><input class="form-input" id="tr-to" placeholder="Hotel, Station…" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">Vehicle Type</label>
          <select class="form-select" id="tr-vehicle"><option>Sedan</option><option>Innova</option><option>Tempo Traveller</option><option>Bus</option><option>Van</option><option>Luxury Car</option><option>Auto</option></select>
        </div>
        <div class="form-group"><label class="form-label">Driver Name</label><input class="form-input" id="tr-driver" placeholder="Driver name"></div>
        <div class="form-group"><label class="form-label">Driver Phone</label><input class="form-input" id="tr-phone" placeholder="Driver mobile"></div>
        <div class="form-group"><label class="form-label">Vendor / Company</label><input class="form-input" id="tr-vendor" placeholder="Taxi company…"></div>
      </div>
    </div>

    <!-- ACTIVITY / SIGHTSEEING FIELDS -->
    <div class="field-group" id="fg-activity">
      <div class="form-section">Activity Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Activity Name</label><input class="form-input" id="ac-name" placeholder="Backwater Cruise…" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="ac-loc" placeholder="Alleppey, Kerala…"></div>
        <div class="form-group"><label class="form-label">Duration</label><input class="form-input" id="ac-duration" placeholder="2 hours, Full day…"></div>
        <div class="form-group"><label class="form-label">Provider / Vendor</label><input class="form-input" id="ac-vendor" placeholder="Tour operator name"></div>
        <div class="form-group"><label class="form-label">Booking Ref</label><input class="form-input" id="ac-ref" oninput="if(this.value)document.getElementById('item-ref').value=this.value"></div>
        <div class="form-group"><label class="form-label">Inclusions</label><input class="form-input" id="ac-incl" placeholder="Guide, Entry fee…"></div>
      </div>
    </div>

    <!-- MEAL FIELDS -->
    <div class="field-group" id="fg-meal">
      <div class="form-section">Meal Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Meal Type</label>
          <select class="form-select" id="ml-type" onchange="autoFillItemTitle()"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Brunch</option><option>Hi-Tea</option><option>BBQ</option></select>
        </div>
        <div class="form-group"><label class="form-label">Restaurant / Venue</label><input class="form-input" id="ml-venue" placeholder="Restaurant name…" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label">Cuisine</label><input class="form-input" id="ml-cuisine" placeholder="Indian, Continental…"></div>
        <div class="form-group"><label class="form-label">Included</label>
          <select class="form-select" id="ml-incl"><option value="yes">Included in Package</option><option value="no">Extra / Own Cost</option></select>
        </div>
      </div>
    </div>

    <!-- VISA / TRAIN / BUS / CRUISE / INSURANCE FIELDS -->
    <div class="field-group" id="fg-misc">
      <div class="form-section" id="misc-section-title">Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label" id="misc-f1-lbl">Field 1</label><input class="form-input" id="misc-f1" oninput="autoFillItemTitle()"></div>
        <div class="form-group"><label class="form-label" id="misc-f2-lbl">Field 2</label><input class="form-input" id="misc-f2"></div>
        <div class="form-group"><label class="form-label" id="misc-f3-lbl">Field 3</label><input class="form-input" id="misc-f3"></div>
        <div class="form-group"><label class="form-label" id="misc-f4-lbl">Field 4</label><input class="form-input" id="misc-f4"></div>
      </div>
    </div>

    <div class="form-group" style="margin-top:8px"><label class="form-label">Notes</label><textarea class="form-textarea" id="item-notes" rows="2" placeholder="Additional notes…"></textarea></div>
    <div id="item-error" style="color:var(--red);font-size:12px;display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-item')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- ══ PASSENGERS MODAL ══ -->
<div class="modal-overlay" id="modal-passengers">
  <div class="modal modal-lg">
    <div class="modal-title">👥 Passenger List</div>
    <div id="pax-list-form"></div>
    <button class="btn btn-outline" onclick="addPaxRow()" style="margin-bottom:12px">+ Add Passenger</button>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-passengers')">Cancel</button>
      <button class="btn btn-primary" onclick="savePassengers()">Save Passengers</button>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanago™ ERP — Invoices</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div><div class="loader-brand"><span class="w">wana</span><span class="g">go</span><span class="tm">™</span></div><div class="loader-text">Loading…</div></div>
<div class="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <div class="topbar"><div class="topbar-title">Invoice Management</div><div class="topbar-actions"><div class="search-wrap"><svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-inp" id="inv-search" type="text" placeholder="Search invoices..." oninput="renderInvoices()" autocomplete="off"/></div><div id="topbar-user" style="font-size:12px;color:var(--textd);padding:0 8px"></div></div></div>
    <div id="content"><div class="page active">

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:18px" id="inv-strip"></div>

      <!-- Overdue Banner -->
      <div id="inv-overdue-banner" style="display:none;background:linear-gradient(135deg,#fff0f0,#fff5f5);border:1px solid rgba(192,57,43,.25);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;align-items:center;gap:10px">
        <span style="font-size:18px">🔴</span>
        <div style="flex:1"><div style="font-size:12.5px;font-weight:700;color:var(--red)" id="inv-overdue-msg"></div><div style="font-size:11px;color:var(--textd);margin-top:1px">Click 'Overdue' filter to view</div></div>
        <button class="btn btn-sm btn-danger" onclick="filterInvoices('overdue',document.querySelectorAll('.page .chip')[5])">View Overdue</button>
      </div>

      <!-- AI Recovery Strip -->
      <div id="inv-ai-strip" style="margin-bottom:14px"></div>

      <!-- Toolbar -->
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;box-shadow:var(--sh)">
        <div class="filter-bar" style="margin:0;flex:1;flex-wrap:wrap">
          <div class="chip active" onclick="filterInvoices('all',this)">All</div>
          <div class="chip" onclick="filterInvoices('draft',this)">📝 Draft</div>
          <div class="chip" onclick="filterInvoices('unpaid',this)">⏳ Unpaid</div>
          <div class="chip" onclick="filterInvoices('paid',this)">✅ Paid</div>
          <div class="chip" onclick="filterInvoices('overdue',this)">🔴 Overdue</div>
        </div>
        <select id="inv-sort" onchange="renderInvoices()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:11.5px;background:var(--cream);font-family:inherit;cursor:pointer;outline:none"><option value="newest">Newest</option><option value="oldest">Oldest</option><option value="amount-desc">Amount ↓</option><option value="amount-asc">Amount ↑</option><option value="due">Due Date</option></select>
        <input type="date" id="inv-date-from" onchange="renderInvoices()" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:11px;background:var(--cream);font-family:inherit;outline:none" title="From">
        <span style="font-size:11px;color:var(--textd)">→</span>
        <input type="date" id="inv-date-to" onchange="renderInvoices()" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:11px;background:var(--cream);font-family:inherit;outline:none" title="To">
        <button class="btn btn-sm btn-outline" onclick="clearInvDateFilter()" style="padding:6px 8px;font-size:11px">✕</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table><thead><tr><th>Invoice #</th><th>Booking</th><th>Customer</th><th>Total</th><th>Paid</th><th>Balance</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="invoices-tbody"></tbody></table>
      </div>

    </div></div>
  </div>
</div>

<!-- VIEW INVOICE MODAL -->
<div class="modal-overlay" id="modal-view-invoice">
  <div class="modal modal-lg">
    <div class="modal-title" id="vi-title">Invoice</div>
    <div id="vi-body"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-view-invoice')">Close</button><button class="btn btn-green" onclick="printInvoice(document.getElementById('modal-view-invoice')._invId)">🖨 Print</button><button class="btn btn-outline" onclick="whatsappInvoice(document.getElementById('modal-view-invoice')._invId)" style="background:#25d366;color:#fff;border-color:#25d366">💬 WhatsApp</button></div>
  </div>
</div>

<div id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>
<script src="../js/sidebar.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/firestore.js"></script>
<script src="../js/db.js"></script>
<script src="../js/services.js"></script>
<script src="../js/rbac.js"></script>
<script type="module" src="../js/invoices.js"></script>
<script src="../js/wanago-space.js"></script>
<script src="../js/notify.js"></script>
<script src="../js/scheduler.js"></script>
</body>
</html>
